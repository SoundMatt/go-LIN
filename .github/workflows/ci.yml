name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Cross-platform unit tests ─────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (unit + race)
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── Per-package coverage floor ────────────────────────────────────────────
  # Library packages must hold >= 85% statement coverage. cmd/ (CLI glue with
  # os.Exit / signal handling) and examples/ are excluded.
  coverage-gate:
    name: Coverage floor (library packages >= 85%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Enforce per-package coverage floor
        shell: bash
        run: |
          FLOOR=85
          fail=0
          while read -r line; do
            pkg=$(echo "$line" | grep -oE 'github.com/[^[:space:]]+' | head -1)
            cov=$(echo "$line" | grep -oE '[0-9.]+%' | head -1 | tr -d '%')
            case "$pkg" in
              */cmd/*|*/examples/*) echo "skip $pkg (excluded)"; continue ;;
            esac
            [ -z "$cov" ] && continue
            if awk "BEGIN{exit !($cov < $FLOOR)}"; then
              echo "FAIL $pkg ${cov}% < ${FLOOR}%"; fail=1
            else
              echo "ok   $pkg ${cov}%"
            fi
          done < <(go test -cover ./... 2>/dev/null | grep 'coverage:')
          exit $fail

  # ── Benchmark smoke run ───────────────────────────────────────────────────
  benchmark-smoke:
    name: Benchmark smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test -bench (smoke, 1 iteration)
        run: >
          go test
          -bench=.
          -benchtime=1x
          -benchmem
          -run=^$
          ./virtual/...

  # ── Short fuzz runs ───────────────────────────────────────────────────────
  # Iteration-based (-fuzztime=Nx), not duration-based. A wall-clock fuzztime
  # races Go's worker deadline and spuriously reports "context deadline
  # exceeded" when a worker is mid-execution at the cutoff. An explicit
  # iteration count stops cleanly and keeps this smoke run deterministic.
  fuzz-short:
    name: Fuzz (short, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Clear fuzz corpus cache
        run: go clean -fuzzcache

      - name: FuzzSendHeader (virtual)
        run: go test -fuzz=^FuzzSendHeader$ -fuzztime=200000x ./virtual/...

      - name: FuzzParse (ldf)
        run: go test -fuzz=^FuzzParse$ -fuzztime=200000x ./ldf/...

      - name: FuzzProtectUnwrap (safety)
        run: go test -fuzz=^FuzzProtectUnwrap$ -fuzztime=200000x ./safety/...

  # ── RELAY conformance gate (spec §12 / §17 / §20.1.1) ─────────────────────
  # Validates the built CLI's version/capabilities/status documents against the
  # §12 JSON Schemas embedded in the relay binary. --strict fails on FAIL or WARN.
  # Pin the relay version so spec bumps are an explicit upgrade.
  relay-conform:
    name: RELAY conform (--strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install relay CLI
        run: go install github.com/SoundMatt/RELAY/cmd/relay@v1.11.0

      - name: Build CLI
        run: go build -o /tmp/go-lin ./cmd/go-lin

      - name: relay conform --strict
        run: relay conform --strict /tmp/go-lin

  # ── RELAY interop behavioural conformance (spec §11.2 / §20.2) ────────────
  # Drives the CLI's `convert` command with the LIN golden vectors and confirms
  # its relay.Message output is EQUIVALENT to the reference implementation.
  relay-interop:
    name: RELAY interop (LIN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install relay CLI
        run: go install github.com/SoundMatt/RELAY/cmd/relay@v1.11.0

      - name: Build CLI
        run: go build -o /tmp/go-lin ./cmd/go-lin

      - name: relay interop --protocol LIN
        run: relay interop --protocol LIN /tmp/go-lin

  # ── go-FuSa full safety lifecycle (spec §20.1.2) ──────────────────────────
  # Pinned to v0.30.0. §20 makes the full lifecycle normative: every change must
  # pass check (ERROR gate), 100% requirement traceability, cybersecurity
  # analysis, dependency vulnerability scan, and tool qualification. The
  # remaining steps generate evidence artifacts (verify/fmea/release) and are
  # non-gating. To upgrade: install the new version locally, run the gating
  # commands, fix all findings, then bump the @version pin below.
  gofusa:
    name: go-FuSa full lifecycle (v0.30.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: gofusa check (gate on ERROR findings)
        run: gofusa check ./...

      - name: gofusa trace (gate on 100% requirement traceability)
        run: gofusa trace -req-coverage 100

      - name: gofusa cyber (cybersecurity analysis)
        run: gofusa cyber

      - name: gofusa vuln (dependency vulnerability scan)
        run: gofusa vuln

      - name: gofusa trace (gate on 100% requirements tested)
        run: gofusa trace -sec-tested 100

      - name: gofusa cyber (cybersecurity analysis)
        run: gofusa cyber

      - name: gofusa vuln (dependency vulnerability scan)
        run: gofusa vuln

      - name: gofusa qualify (tool qualification suite)
        run: gofusa qualify

      - name: gofusa verify (test evidence bundle)
        run: gofusa verify

      - name: gofusa coverage (structural coverage report)
        run: |
          go test -coverprofile=coverage.out ./...
          gofusa coverage -format json -output coverage-report.json

      - name: gofusa hara (validate HARA structured data)
        run: gofusa hara show > /dev/null

      - name: gofusa boundary / sci / coupling / tara / fmea (evidence)
        run: |
          gofusa boundary
          gofusa sci -output sci.json
          gofusa coupling
          gofusa tara
          gofusa fmea -cyber

      - name: gofusa release (SBOM + build provenance, SLSA)
        run: gofusa release

      - name: Inject build provenance builder (SLSA L2 / IEC 62443 CR 1.4)
        run: |
          python3 - <<'PY'
          import json, os
          p = "provenance.json"
          d = json.load(open(p))
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          repo = os.environ.get("GITHUB_REPOSITORY", "SoundMatt/go-LIN")
          d["builder"] = f"{server}/{repo}/.github/workflows/ci.yml@{os.environ.get('GITHUB_REF','refs/heads/main')}"
          json.dump(d, open(p, "w"), indent=2)
          print("builder:", d["builder"])
          PY

      - name: gofusa audit-pack (bundle all evidence)
        run: gofusa audit-pack --output gofusa-audit-pack.zip || true

      - name: Upload safety evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gofusa-safety-evidence
          path: gofusa-audit-pack.zip
          if-no-files-found: ignore

  # ── Standards compliance gates (ISO 26262 / IEC 61508 / ISO 21434 /
  #    IEC 62443 / DO-178C / UN R.155 / SLSA) ──────────────────────────────────
  # Generates the full evidence set, then runs every go-FuSa compliance gap
  # report. Each report exits non-zero on a GAP or FAIL, so this job fails if
  # the project drifts out of compliance with any standard.
  compliance:
    name: Standards compliance (ISO / IEC / DO / UNECE / SLSA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: Generate evidence
        run: |
          go test -coverprofile=coverage.out ./...
          gofusa check ./...
          gofusa cyber
          gofusa vuln
          gofusa qualify
          gofusa verify
          gofusa coverage -format json -output coverage-report.json
          gofusa boundary
          gofusa sci -output sci.json
          gofusa coupling
          gofusa tara
          gofusa fmea -cyber
          gofusa safety-case
          gofusa check --output cyber-plan.json
          gofusa release

      - name: Inject build provenance builder (SLSA L2 / IEC 62443 CR 1.4)
        run: |
          python3 - <<'PY'
          import json, os
          p = "provenance.json"
          d = json.load(open(p))
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          repo = os.environ.get("GITHUB_REPOSITORY", "SoundMatt/go-LIN")
          d["builder"] = f"{server}/{repo}/.github/workflows/ci.yml@{os.environ.get('GITHUB_REF','refs/heads/main')}"
          json.dump(d, open(p, "w"), indent=2)
          PY

      - name: ISO 26262 (Part 6)
        run: gofusa iso26262
      - name: IEC 61508 (Parts 1-3)
        run: gofusa iec61508
      - name: ISO 21434 (cybersecurity)
        run: gofusa iso21434
      - name: IEC 62443-4-2 (IACS cybersecurity)
        run: gofusa iec62443
      - name: DO-178C (Annex A)
        run: gofusa do178
      - name: UN R.155 (CSMS)
        run: gofusa unece
      - name: SLSA v1.0 (supply chain)
        run: gofusa slsa
