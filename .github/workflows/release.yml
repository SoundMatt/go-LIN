name: Release

# Runs on every vX.Y.Z tag push.
# Regenerates all go-FuSa safety artifacts and commits them back to main.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  regenerate-safety-artifacts:
    name: Regenerate safety artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: Regenerate dFMEA table
        run: gofusa fmea -cyber

      - name: Regenerate TARA (threat analysis, ISO 21434)
        run: gofusa tara

      - name: Regenerate architecture boundary + configuration index
        run: |
          gofusa boundary
          gofusa sci -output sci.json

      - name: Generate test evidence bundle (closes safety-case verify gap)
        run: gofusa verify || true

      - name: Regenerate safety case
        run: gofusa safety-case

      - name: Regenerate SBOM, provenance, and artifact manifest
        run: gofusa release

      - name: Inject build provenance builder (SLSA L2 / IEC 62443 CR 1.4)
        run: |
          python3 - <<'PY'
          import json, os
          p = "provenance.json"
          d = json.load(open(p))
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          repo = os.environ.get("GITHUB_REPOSITORY", "SoundMatt/go-LIN")
          ref = os.environ.get("GITHUB_REF", "refs/heads/main")
          d["builder"] = f"{server}/{repo}/.github/workflows/release.yml@{ref}"
          json.dump(d, open(p, "w"), indent=2)
          print("builder:", d["builder"])
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit regenerated artifacts
        run: |
          TAG="${{ github.ref_name }}"
          git add fmea.csv fmea.json \
                  tara.json tara.md \
                  boundary.mermaid boundary.dot sci.json \
                  safety-case.json safety-case.md safety-case.mermaid \
                  sbom.json provenance.json artifact-manifest.json
          if git diff --cached --quiet; then
            echo "No artifact changes for $TAG — nothing to commit."
          else
            git commit -m "chore: regenerate safety artifacts for $TAG [skip ci]"
            git push origin HEAD:refs/heads/main
          fi
